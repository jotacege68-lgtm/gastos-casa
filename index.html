<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Hogar - Control de Acceso</title>

    <!-- Enlace al manifiesto para Android -->
    <link rel="manifest" href="manifest.json">

    <!-- Icono para iPhone/iPad -->
    <link rel="apple-touch-icon" href="logohogar.png">

    <!-- Configuración estética para móviles -->
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestión Hogar">

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: var(--bg); 
            color: #1e293b;
        }
        .container { 
            text-align: center; 
            background: white; 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
        }
        .logo-container {
            background: #f1f5f9;
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #64748b; font-size: 0.95rem; line-height: 1.5; }
        .hint {
            margin-top: 2rem;
            padding: 1rem;
            background: #eff6ff;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="logohogar.png" alt="Logo Hogar" onerror="this.src='https://via.placeholder.com/120?text=Hogar'">
        </div>
        <h1>Gestión de Edificio</h1>
        <p>Acceso al sistema de control y administración de residentes.</p>
        
        <div class="hint">
            💡 Para instalar esta app, abre el menú de tu navegador y selecciona <b>"Añadir a pantalla de inicio"</b>.
        </div>
    </div>
</body>
</html>
