<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gastos Casa PRO - Evolution Edition</title>
    
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Gastos Casa">
    <link rel="icon" sizes="192x192" href="https://i.ibb.co/C5f3W1N/logo-casa-tj-azul.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/C5f3W1N/logo-casa-tj-azul.png">
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --juan: #3b82f6;
            --juan-light: #60a5fa;
            --juan-dark: #2563eb;
            --tania: #ec4899;
            --tania-light: #f472b6;
            --tania-dark: #db2777;
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --header-h: 75px;
            --radius: 20px;
            --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding-top: calc(var(--header-h) + 20px);
            color: var(--text-main);
            min-height: 100vh;
        }

        .tabs {
            position: fixed; top: 0; width: 100%;
            background: var(--bg);
            display: flex; height: var(--header-h);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            z-index: 1000; overflow-x: auto; scrollbar-width: none;
            backdrop-filter: blur(10px);
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex: 1; min-width: 80px; border: none; background: transparent;
            font-size: 10px; font-weight: 700; color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase; cursor: pointer; padding: 10px 5px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.3s; position: relative;
        }
        .tab-btn.active { color: #ffffff !important; background: rgba(255, 255, 255, 0.15); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60%; height: 3px; background: white; border-radius: 3px 3px 0 0; }

        .container { padding: 16px; display: none; max-width: 500px; margin: auto; animation: slideUp 0.4s ease; }
        .container.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); padding: 24px; border-radius: var(--radius); margin-bottom: 16px; box-shadow: var(--shadow-md); border: 1px solid rgba(0,0,0,0.05); }

        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        select, input[type="text"], input[type="number"], input[type="date"] { 
            width: 100%; padding: 16px; margin-bottom: 16px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 16px; color: var(--text-main); background: #f8fafc; transition: 0.3s; 
        }
        select:focus, input:focus { outline: none; border-color: var(--juan); background: #fff; }

        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }

        button { width: 100%; padding: 18px; margin-bottom: 12px; border: none; border-radius: 16px; font-weight: 800; font-size: 15px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-juan { background: linear-gradient(135deg, var(--juan-light) 0%, var(--juan-dark) 100%); color: white; }
        .btn-tania { background: linear-gradient(135deg, var(--tania-light) 0%, var(--tania-dark) 100%); color: white; }
        .btn-grey { background: #64748b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-outline { background: white; color: var(--juan-dark); border: 2px solid var(--juan-dark); }

        .nav-mes { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav-mes h4 { margin: 0; font-weight: 800; color: var(--text-main); }
        .btn-nav { width: auto; padding: 10px 20px; margin: 0; background: #f1f5f9; color: var(--text-main); }

        .historial-item { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; background: white; border-radius: 12px; margin-bottom: 8px; }
        .item-nota { font-size: 12px; color: #92400e; background: #fef3c7; padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 4px; }
        
        .total-filtro { background: #1e293b; color: #fbbf24; padding: 20px; border-radius: var(--radius); font-weight: 900; font-size: 26px; text-align: center; margin-bottom: 20px; }
        .subtotal-seccion { background: #f1f5f9; padding: 12px 15px; font-weight: 800; font-size: 13px; border-radius: 10px; margin: 10px 0; border-left: 4px solid #cbd5e1; display: flex; justify-content: space-between; }

        .config-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f8fafc; border-radius: 10px; margin-bottom: 5px; font-size: 14px; border: 1px solid #e2e8f0; }
        
        .resultado { padding: 20px; border-radius: 15px; margin-top: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        .debe-juan { background: #fee2e2; color: #b91c1c; border: 2px solid #fca5a5; }
        .debe-tania { background: #fce7f3; color: #9d174d; border: 2px solid #f9a8d4; }

        /* Estilos del Modal de Filtro Múltiple */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: white; border-radius: 20px; width: 100%; max-width: 400px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 20px; border-bottom: 1px solid #e2e8f0; text-align: center; font-weight: 800; }
        .modal-body { padding: 10px 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 20px; border-top: 1px solid #e2e8f0; }
        .checkbox-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px dashed #f1f5f9; font-size: 15px; font-weight: 500; cursor: pointer; }
        .checkbox-item input { width: 24px; height: 24px; margin-right: 15px; accent-color: var(--juan-dark); cursor: pointer; }
    </style>
</head>
<body>

<nav class="tabs">
    <button class="tab-btn active" onclick="showTab('DIARIOS', this)">DIARIO</button>
    <button class="tab-btn" onclick="showTab('MENSUALES', this)">MENSUAL</button>
    <button class="tab-btn" onclick="showTab('JC', this)">SOLO JC</button>
    <button class="tab-btn" onclick="showTab('HISTORIAL', this)">HISTORIAL</button>
    <button class="tab-btn" onclick="showTab('BALANCE', this)">BALANCE</button>
    <button class="tab-btn" onclick="showTab('CONFIG', this)">AJUSTES</button>
</nav>

<!-- Diarios -->
<div id="DIARIOS" class="container active">
    <div class="card">
        <label>FECHA DEL GASTO</label>
        <input type="date" id="fecha-diarios">
        <label>RUBRO DIARIO</label>
        <select id="select-diarios" onchange="toggleNota('diarios')"></select>
        <input type="text" id="nota-diarios" style="display:none" placeholder="¿QUÉ SE COMPRÓ?">
        <input type="number" id="monto-diarios" inputmode="decimal" placeholder="MONTO $">
        <button class="btn-juan" onclick="guardarGasto('DIARIOS', 'JUAN')">PAGÓ JUAN</button>
        <button class="btn-tania" onclick="guardarGasto('DIARIOS', 'TANIA')">PAGÓ TANIA</button>
    </div>
</div>

<!-- Mensuales -->
<div id="MENSUALES" class="container">
    <div class="card">
        <label>MES DE CARGA</label>
        <div class="row">
            <div><select id="mes-mensuales"></select></div>
            <div><select id="anio-mensuales"></select></div>
        </div>
        <label>RUBRO MENSUAL</label>
        <select id="select-mensuales" onchange="toggleNota('mensuales')"></select>
        <input type="text" id="nota-mensuales" style="display:none" placeholder="DETALLE EXTRA">
        <label>CUOTAS</label>
        <input type="number" id="cuotas-mensuales" value="1" min="1" max="24">
        <input type="number" id="monto-mensuales" inputmode="decimal" placeholder="MONTO $">
        <button class="btn-juan" onclick="guardarGasto('MENSUALES', 'JUAN')">PAGÓ JUAN</button>
        <button class="btn-tania" onclick="guardarGasto('MENSUALES', 'TANIA')">PAGÓ TANIA</button>
    </div>
</div>

<!-- JC -->
<div id="JC" class="container">
    <div class="card">
        <label>MES DE CARGA</label>
        <div class="row">
            <div><select id="mes-jc"></select></div>
            <div><select id="anio-jc"></select></div>
        </div>
        <label>RUBRO SOLO JC (DEUDA JUAN)</label>
        <select id="select-jc" onchange="toggleNota('jc')"></select>
        <input type="text" id="nota-jc" style="display:none" placeholder="DETALLE JC">
        <label>CUOTAS</label>
        <input type="number" id="cuotas-jc" value="1" min="1" max="24">
        <input type="number" id="monto-jc" inputmode="decimal" placeholder="MONTO $">
        <button class="btn-tania" onclick="guardarGasto('JC', 'TANIA')">PAGÓ TANIA</button>
    </div>
</div>

<!-- Historial -->
<div id="HISTORIAL" class="container">
    <div class="card">
        <label>FILTRO PRINCIPAL</label>
        <select id="filtro-principal" onchange="cargarHistorial()">
            <option value="TODO">GASTOS CASA (TODO)</option>
            <option value="JUAN">LO QUE PAGÓ JUAN</option>
            <option value="TANIA">LO QUE PAGÓ TANIA</option>
            <option value="JC">LISTA SOLO JC</option>
        </select>
        
        <label style="margin-top:15px">FILTRO PERSONALIZADO</label>
        <button id="btn-filtro-multiple" class="btn-outline" onclick="abrirModalFiltro()">🔍 SUMAR VARIOS RUBROS</button>
    </div>
    
    <div class="nav-mes">
        <button class="btn-nav" onclick="cambiarMesHistorial(-1)">◀</button>
        <h4 id="titulo-mes-historial">MES</h4>
        <button class="btn-nav" onclick="cambiarMesHistorial(1)">▶</button>
    </div>
    <div id="total-acumulado" class="total-filtro">$0</div>
    <div id="lista-historial"></div>
</div>

<!-- Balance -->
<div id="BALANCE" class="container">
    <div class="nav-mes">
        <button class="btn-nav" onclick="cambiarMesBalance(-1)">◀</button>
        <h4 id="titulo-mes-balance">MES</h4>
        <button class="btn-nav" onclick="cambiarMesBalance(1)">▶</button>
    </div>
    <div class="card" id="resumen-balance"></div>
    <button class="btn-grey" onclick="calcularBalance()">🔄 RECALCULAR</button>
    <button class="btn-juan" style="background:#10b981" onclick="cerrarMes()">🔒 GUARDAR CIERRE MES</button>
    
    <hr style="border:none; border-top: 1px solid #cbd5e1; margin: 30px 0;">
    <div id="lista-cierres"></div>
</div>

<!-- Ajustes -->
<div id="CONFIG" class="container">
    <div class="card">
        <h3>PANEL DE RUBROS</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">Personaliza las listas que aparecen en los selectores.</p>
        
        <label>NUEVO RUBRO</label>
        <div class="row">
            <input type="text" id="nuevo-item-nombre" placeholder="Ej: GIMNASIO">
            <select id="nuevo-item-tipo" style="width:120px">
                <option value="diarios">DIARIO</option>
                <option value="mensuales">MENSUAL</option>
                <option value="jc">SOLO JC</option>
            </select>
        </div>
        <button class="btn-juan" onclick="agregarNuevoRubro()">+ AGREGAR RUBRO</button>
        
        <hr style="border:none; border-top: 1px solid #e2e8f0; margin: 20px 0;">
        <label>CATEGORÍAS ACTUALES</label>
        <div id="lista-gestion-rubros"></div>
    </div>
</div>

<!-- Modal Filtro Múltiple -->
<div id="modal-filtro" class="modal">
    <div class="modal-content">
        <div class="modal-header">SELECCIONA QUÉ SUMAR</div>
        <div class="modal-body" id="modal-lista-rubros">
            <!-- Checkboxes generados dinámicamente -->
        </div>
        <div class="modal-footer">
            <button class="btn-juan" onclick="aplicarFiltroMultiple()" style="margin-bottom:10px">APLICAR FILTRO</button>
            <button class="btn-grey" onclick="limpiarFiltroMultiple()" style="margin-bottom:0">MOSTRAR TODO</button>
        </div>
    </div>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBDlHjKXf33pCEznyLAmFrTDXVPevrHe9Q",
      authDomain: "gastoscasa-d8bc2.firebaseapp.com",
      databaseURL: "https://gastoscasa-d8bc2-default-rtdb.firebaseio.com",
      projectId: "gastoscasa-d8bc2",
      appId: "1:749635992986:web:7916d888f54eb5c3ab0e23"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const mesesNombres = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
    let listas = { diarios: [], mensuales: [], jc: [] };
    let fechaHistorialView = new Date();
    let fechaBalanceView = new Date();
    let balanceActual = {};
    let rubrosFiltroMultiple = [];

    // --- Inicio automático ---
    window.onload = () => {
        inicializarApp();
    };

    async function inicializarApp() {
        const snap = await db.ref('config/categorias').once('value');
        if(snap.exists()) { listas = snap.val(); } 
        else {
            listas = {
                diarios: ["AGUA", "AUTO GASTOS", "AVICOLA", "BOLSAS", "CARNICERIA", "CASA VARIOS", "COMBUSTIBLE", "COMIDAS AFUERA", "DENTISTA", "EMPANADAS", "FARMACIA", "FCA. PASTAS", "FERIA PAPEL/CAFE", "FERIA VARIOS", "FERIA VERDURA", "FERRETERIA", "GASTOS ARTIGAS", "GATA COMIDA-PIEDRAS", "LA MOLIENDA", "LAVANDERIA", "PANADERIA", "PANADERIA S/G", "PEAJES", "PESCADERIA", "PIZZA", "PROPINAS", "REGALOS", "SUPERGAS", "SUPERMERCADO", "VARIOS", "VERDULERIA", "VETERINARIA EXTRAS"],
                mensuales: ["A.N.V Juan", "A.N.V. Tania", "ABERTURAS", "CASA VARIOS", "ELECTRICIDAD", "ESPAÑOLA MOVIL", "GASTOS COMUNES DOLARES", "GASTOS COMUNES PESOS", "HBO", "INTERNET", "NETFLIX", "OLLA LEO FA", "SERVICIO FUNEBRE", "VARIOS", "VETERINARIA", "TARJETA BROU REC.", "TARJETA ITAU", "TARJETA OCA", "MANTENIMIENTO AUTO", "CONTRIBUCION INMOBILIARIA", "IMP. PRIMARIA", "IMP. PUERTA", "PATENTE RODADOS", "SEGURO CASA Y AUTO"],
                jc: ["EL TUNEL", "LA MOLIENDA", "CLUB AEBU", "MOVILES", "MEDICAMENTOS ESP.", "GASTOS OCA", "GASTOS ITAU", "GASTOS SANTANDER"]
            };
            await db.ref('config/categorias').set(listas);
        }
        cargarInterfazListas();
        refrescarVistas();
    }

    function cargarInterfazListas() {
        const hoy = new Date();
        document.getElementById('fecha-diarios').value = hoy.toISOString().split('T')[0];

        ['diarios','mensuales','jc'].forEach(t => {
            const sel = document.getElementById(`select-${t}`);
            if(!sel) return;
            sel.innerHTML = "";
            listas[t].sort().forEach(item => { sel.innerHTML += `<option value="${item}">${item}</option>`; });
            
            if(t !== 'diarios') {
                const mesSel = document.getElementById(`mes-${t}`);
                const anioSel = document.getElementById(`anio-${t}`);
                mesSel.innerHTML = ""; anioSel.innerHTML = "";
                // ACÁ ESTABA EL ERROR: Faltaba el paréntesis de cierre en el forEach de abajo
                mesesNombres.forEach((m, i) => { mesSel.innerHTML += `<option value="${i+1}" ${i === hoy.getMonth() ? 'selected' : ''}>${m}</option>`; });
                for(let a = 2025; a <= 2027; a++) { anioSel.innerHTML += `<option value="${a}" ${a === hoy.getFullYear() ? 'selected' : ''}>${a}</option>`; }
            }
        });

        // Llenar Gestión de Ajustes
        const gestionDiv = document.getElementById('lista-gestion-rubros');
        gestionDiv.innerHTML = "";
        ['diarios','mensuales','jc'].forEach(tipo => {
            gestionDiv.innerHTML += `<div style="margin-top:10px; font-weight:bold; color:var(--text-muted); font-size:11px;">${tipo.toUpperCase()}</div>`;
            listas[tipo].sort().forEach(item => {
                gestionDiv.innerHTML += `<div class="config-item"><span>${item}</span><button style="width:auto; padding:5px 10px; background:#fee2e2; color:#ef4444; margin:0; font-size:10px" onclick="eliminarRubro('${tipo}', '${item}')">BORRAR</button></div>`;
            });
        });

        // Preparar Modal de Filtro Múltiple
        generarCheckboxesFiltro();
    }

    // --- Lógica del Filtro Múltiple ---
    function generarCheckboxesFiltro() {
        const modalBody = document.getElementById('modal-lista-rubros');
        modalBody.innerHTML = "";
        
        const todosLosRubros = [...new Set([...listas.diarios, ...listas.mensuales, ...listas.jc])].sort();
        
        todosLosRubros.forEach(rubro => {
            modalBody.innerHTML += `
                <label class="checkbox-item">
                    <input type="checkbox" value="${rubro}" class="filtro-checkbox"> ${rubro}
                </label>
            `;
        });
    }

    function abrirModalFiltro() {
        document.getElementById('modal-filtro').style.display = 'flex';
        const checkboxes = document.querySelectorAll('.filtro-checkbox');
        checkboxes.forEach(cb => {
            cb.checked = rubrosFiltroMultiple.includes(cb.value);
        });
    }

    function aplicarFiltroMultiple() {
        rubrosFiltroMultiple = [];
        const checkboxes = document.querySelectorAll('.filtro-checkbox');
        checkboxes.forEach(cb => {
            if(cb.checked) rubrosFiltroMultiple.push(cb.value);
        });
        
        document.getElementById('modal-filtro').style.display = 'none';
        
        const btn = document.getElementById('btn-filtro-multiple');
        if(rubrosFiltroMultiple.length > 0) {
            btn.innerHTML = `🔍 SUMANDO ${rubrosFiltroMultiple.length} RUBROS (Toca para editar)`;
            btn.style.background = "var(--juan-light)";
            btn.style.color = "white";
        } else {
            btn.innerHTML = "🔍 SUMAR VARIOS RUBROS";
            btn.style.background = "white";
            btn.style.color = "var(--juan-dark)";
        }
        
        cargarHistorial();
    }

    function limpiarFiltroMultiple() {
        rubrosFiltroMultiple = [];
        const btn = document.getElementById('btn-filtro-multiple');
        btn.innerHTML = "🔍 SUMAR VARIOS RUBROS";
        btn.style.background = "white";
        btn.style.color = "var(--juan-dark)";
        document.getElementById('modal-filtro').style.display = 'none';
        cargarHistorial();
    }

    // --- Gestión de Configuración ---
    async function agregarNuevoRubro() {
        const nombre = document.getElementById('nuevo-item-nombre').value.toUpperCase().trim();
        const tipo = document.getElementById('nuevo-item-tipo').value;
        if(!nombre) return alert("Escribe un nombre");
        listas[tipo].push(nombre);
        await db.ref('config/categorias').set(listas);
        document.getElementById('nuevo-item-nombre').value = "";
        cargarInterfazListas();
        alert("Rubro agregado correctamente.");
    }

    async function eliminarRubro(tipo, nombre) {
        if(confirm(`¿Quitar "${nombre}"?`)) {
            listas[tipo] = listas[tipo].filter(i => i !== nombre);
            await db.ref('config/categorias').set(listas);
            cargarInterfazListas();
            rubrosFiltroMultiple = rubrosFiltroMultiple.filter(i => i !== nombre);
        }
    }

    // --- Guardado de Gastos ---
    async function guardarGasto(tipo, pagador) {
        const tab = tipo.toLowerCase();
        const item = document.getElementById(`select-${tab}`).value;
        const nota = document.getElementById(`nota-${tab}`).value;
        const monto = parseFloat(document.getElementById(`monto-${tab}`).value);
        let cuotas = (tipo === 'MENSUALES' || tipo === 'JC') ? (parseInt(document.getElementById(`cuotas-${tab}`).value) || 1) : 1;
        if (!monto || monto <= 0) return alert("MONTO INVÁLIDO");

        let mesElegido, anioElegido, fechaStr;
        if (tipo === 'DIARIOS') {
            fechaStr = document.getElementById('fecha-diarios').value;
            mesElegido = parseInt(fechaStr.split('-')[1]);
            anioElegido = parseInt(fechaStr.split('-')[0]);
        } else {
            mesElegido = parseInt(document.getElementById(`mes-${tab}`).value);
            anioElegido = parseInt(document.getElementById(`anio-${tab}`).value);
        }

        const promesas = [];
        const hoy = new Date();
        const diaActual = hoy.getDate();

        for(let i = 0; i < cuotas; i++) {
            let fFinal, mesAnio;
            if(tipo === 'DIARIOS') { fFinal = fechaStr; mesAnio = `${mesElegido}-${anioElegido}`; }
            else {
                let mC = mesElegido - 1 + i;
                let aC = anioElegido;
                let dG = Math.min(diaActual, new Date(aC, mC + 1, 0).getDate());
                let fF = new Date(aC, mC, dG);
                fFinal = fF.toISOString().split('T')[0];
                mesAnio = `${fF.getMonth() + 1}-${fF.getFullYear()}`;
            }
            promesas.push(db.ref(`gastos_global`).push({ tipo, item, nota: cuotas > 1 ? `${nota} (${i+1}/${cuotas})` : nota, monto, pagador, fecha: fFinal, mesAnio, timestamp: firebase.database.ServerValue.TIMESTAMP }));
        }
        await Promise.all(promesas);
        alert("✅ GUARDADO");
        document.getElementById(`monto-${tab}`).value = ""; 
        document.getElementById(`nota-${tab}`).value = "";
        refrescarVistas();
    }

    function toggleNota(tipo) {
        const item = document.getElementById(`select-${tipo}`).value;
        const rubrosNota = ["CASA VARIOS", "REGALOS", "COMIDAS AFUERA", "VARIOS", "GASTOS OCA", "GASTOS ITAU", "GASTOS SANTANDER"];
        document.getElementById(`nota-${tipo}`).style.display = rubrosNota.includes(item) ? "block" : "none";
    }

    // --- Vistas y Lógica de Lectura ---
    function refrescarVistas() {
        if(document.getElementById('HISTORIAL').classList.contains('active')) cargarHistorial();
        if(document.getElementById('BALANCE').classList.contains('active')) calcularBalance();
    }

    function cambiarMesHistorial(n) { fechaHistorialView.setMonth(fechaHistorialView.getMonth() + n); refrescarVistas(); }
    function cambiarMesBalance(n) { fechaBalanceView.setMonth(fechaBalanceView.getMonth() + n); refrescarVistas(); }

    function cargarHistorial() {
        const filtroPrincipal = document.getElementById('filtro-principal').value;
        const mesAnio = `${fechaHistorialView.getMonth() + 1}-${fechaHistorialView.getFullYear()}`;
        document.getElementById('titulo-mes-historial').innerText = `${mesesNombres[fechaHistorialView.getMonth()]} ${fechaHistorialView.getFullYear()}`;
        
        db.ref(`gastos_global`).orderByChild('mesAnio').equalTo(mesAnio).once('value', (s) => {
            let html = ""; let total = 0;
            s.forEach(c => {
                const g = c.val(); g.id = c.key;
                
                // 1. Chequeo Filtro Principal
                let pasaGeneral = false;
                if(filtroPrincipal === 'TODO' && g.tipo !== 'JC') pasaGeneral = true;
                else if(filtroPrincipal === 'JUAN' && g.pagador === 'JUAN' && g.tipo !== 'JC') pasaGeneral = true;
                else if(filtroPrincipal === 'TANIA' && g.pagador === 'TANIA' && g.tipo !== 'JC') pasaGeneral = true;
                else if(filtroPrincipal === 'JC' && g.tipo === 'JC') pasaGeneral = true;

                // 2. Chequeo Filtro Múltiple (Checkbox)
                let pasaRubro = true;
                if(rubrosFiltroMultiple.length > 0 && !rubrosFiltroMultiple.includes(g.item)) {
                    pasaRubro = false;
                }

                if(pasaGeneral && pasaRubro) {
                    html += `<div class="historial-item"><div><small>${g.fecha.split('-')[2]}/${g.fecha.split('-')[1]}</small> <b>${g.item}</b><br>${g.nota ? `<span class="item-nota">${g.nota}</span><br>` : ''}<small>${g.pagador}</small></div><div style="text-align:right"><b>$${g.monto}</b> <button style="width:auto; padding:5px; background:none; color:red; border:none; cursor:pointer" onclick="eliminarGasto('${g.id}')">✕</button></div></div>`;
                    total += g.monto;
                }
            });
            document.getElementById('lista-historial').innerHTML = html || "<p style='text-align:center; color:#64748b; margin-top:20px'>Sin gastos con estos filtros.</p>";
            document.getElementById('total-acumulado').innerText = `$${total.toFixed(0)}`;
        });
    }

    function eliminarGasto(id) { if(confirm("¿Borrar gasto permanentemente?")) db.ref(`gastos_global/${id}`).remove().then(refrescarVistas); }

    function calcularBalance() {
        const mesAnio = `${fechaBalanceView.getMonth() + 1}-${fechaBalanceView.getFullYear()}`;
        document.getElementById('titulo-mes-balance').innerText = `${mesesNombres[fechaBalanceView.getMonth()]} ${fechaBalanceView.getFullYear()}`;
        db.ref(`gastos_global`).orderByChild('mesAnio').equalTo(mesAnio).once('value', (s) => {
            let j = 0, t = 0, jc = 0;
            s.forEach(c => {
                const g = c.val();
                if(g.tipo === 'JC') jc += g.monto;
                else if(g.pagador === 'JUAN') j += g.monto;
                else if(g.pagador === 'TANIA') t += g.monto;
            });
            const debe = ((j + t) / 2 - j) + jc;
            balanceActual = { j, t, jc, deudaJuan: debe, mesAnio };
            document.getElementById('resumen-balance').innerHTML = `
                <div class="subtotal-seccion"><span>Juan pagó casa:</span><span>$${j}</span></div>
                <div class="subtotal-seccion"><span>Tania pagó casa:</span><span>$${t}</span></div>
                <div class="subtotal-seccion" style="background:#e2e8f0"><span>Deuda JC (aplica a Juan):</span><span>$${jc}</span></div>
                <div class="resultado ${debe > 0 ? 'debe-juan' : 'debe-tania'}">
                    ${debe > 0 ? `JUAN DEBE A TANIA $${debe.toFixed(0)}` : `TANIA DEBE A JUAN $${Math.abs(debe).toFixed(0)}`}
                </div>
            `;
        });
        cargarCierres();
    }

    function cerrarMes() {
        if(confirm(`¿Guardar cierre definitivo de ${balanceActual.mesAnio}?`)) {
            db.ref(`cierres/${balanceActual.mesAnio}`).set({ ...balanceActual, fechaCierre: new Date().toISOString() }).then(() => alert("Cierre guardado correctamente."));
        }
    }

    function cargarCierres() {
        db.ref('cierres').once('value', s => {
            let cierres = []; s.forEach(c => cierres.push(c.val()));
            cierres.sort((a,b) => new Date(b.fechaCierre) - new Date(a.fechaCierre));
            let h = "<h4>HISTORIAL DE CIERRES</h4>";
            cierres.forEach(r => {
                h += `<div class="card" style="font-size:12px; padding:12px; margin-bottom:8px;">
                    <b>${r.mesAnio}</b> | J: $${r.j} - T: $${r.t}<br>
                    <div style="margin-top:5px; font-weight:bold; color:${r.deudaJuan > 0 ? '#b91c1c' : '#9d174d'}">
                        ${r.deudaJuan > 0 ? 'Juan debió' : 'Tania debió'}: $${Math.abs(r.deudaJuan).toFixed(0)}
                    </div>
                </div>`;
            });
            document.getElementById('lista-cierres').innerHTML = h;
        });
    }

    function showTab(id, btn) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        btn.classList.add('active');
        refrescarVistas();
    }
</script>
</body>
